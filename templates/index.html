<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Detection YOLOv8</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-blue: #00d4ff;
    --neon-green: #00ff88;
    --neon-orange: #ff6a00;
    --dark-bg: #040d1a;
    --panel-bg: rgba(4, 18, 38, 0.88);
    --border-glow: rgba(0, 212, 255, 0.4);
    --text-primary: #e8f4ff;
    --text-muted: rgba(200, 230, 255, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--dark-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-image {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.28) saturate(1.4);
    z-index: 0;
    transform: scale(1.04);
    animation: bgDrift 20s ease-in-out infinite alternate;
  }

  @keyframes bgDrift {
    from { transform: scale(1.04) translateX(0); }
    to   { transform: scale(1.04) translateX(-12px); }
  }

  /* scanlines overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.07) 3px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
  }

  /* corner accent lines */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── FLOATING HUD DOTS ── */
  .hud-dot {
    position: fixed;
    border-radius: 50%;
    animation: hudPulse 3s ease-in-out infinite;
    z-index: 2;
  }
  .hud-dot:nth-child(1) { width:6px;height:6px;background:var(--neon-blue);top:15%;left:8%;animation-delay:0s; }
  .hud-dot:nth-child(2) { width:4px;height:4px;background:var(--neon-green);top:72%;left:5%;animation-delay:1s; }
  .hud-dot:nth-child(3) { width:5px;height:5px;background:var(--neon-orange);top:30%;right:7%;animation-delay:0.5s; }
  .hud-dot:nth-child(4) { width:4px;height:4px;background:var(--neon-blue);top:80%;right:10%;animation-delay:1.5s; }

  @keyframes hudPulse {
    0%,100% { opacity:0.3; transform:scale(1); }
    50%      { opacity:1;   transform:scale(2.2); }
  }

  /* ── MAIN CARD ── */
  .card {
    position: relative;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--border-glow);
    border-radius: 4px;
    width: 520px;
    padding: 44px 40px 40px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.08),
      0 0 40px rgba(0,212,255,0.12),
      0 30px 80px rgba(0,0,0,0.7);
    animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* glowing top bar */
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-green), var(--neon-blue), transparent);
    border-radius: 2px;
    animation: topBarGlow 3s ease-in-out infinite;
  }
  @keyframes topBarGlow {
    0%,100% { opacity: 0.6; }
    50%      { opacity: 1; box-shadow: 0 0 20px var(--neon-blue); }
  }

  /* corner brackets */
  .card::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-top: 1px solid rgba(0,212,255,0.15);
    border-left: 1px solid rgba(0,212,255,0.15);
    border-right: 1px solid transparent;
    border-bottom: 1px solid transparent;
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 2px;
    padding: 4px 12px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--neon-blue);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .badge-dot {
    width: 5px; height: 5px;
    background: var(--neon-green);
    border-radius: 50%;
    animation: blink 1.2s step-start infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: 1px;
    line-height: 1.3;
  }

  h1 span {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--neon-blue);
    letter-spacing: 4px;
    margin-top: 6px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 1px dashed rgba(0,212,255,0.35);
    border-radius: 3px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
    background: rgba(0,212,255,0.03);
    overflow: hidden;
  }

  .upload-zone:hover {
    border-color: var(--neon-blue);
    background: rgba(0,212,255,0.07);
    box-shadow: inset 0 0 30px rgba(0,212,255,0.06), 0 0 20px rgba(0,212,255,0.08);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 8px rgba(0,212,255,0.5));
    animation: iconFloat 3s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  .upload-label {
    font-size: 14px;
    color: var(--text-primary);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .upload-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  #file-name {
    margin-top: 10px;
    font-size: 11px;
    color: var(--neon-green);
    letter-spacing: 1px;
    min-height: 16px;
    font-family: 'Orbitron', monospace;
  }

  /* ── STATS ROW ── */
  .stats {
    display: flex;
    gap: 10px;
    margin: 20px 0;
  }

  .stat-item {
    flex: 1;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 3px;
    padding: 10px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--neon-blue);
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── BUTTON ── */
  button[type="submit"] {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1px solid var(--neon-blue);
    color: var(--neon-blue);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  button[type="submit"]::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
    transition: left 0.5s;
  }

  button[type="submit"]:hover {
    background: rgba(0,212,255,0.1);
    box-shadow: 0 0 25px rgba(0,212,255,0.25), inset 0 0 25px rgba(0,212,255,0.05);
    color: #fff;
  }

  button[type="submit"]:hover::before {
    left: 100%;
  }

  button[type="submit"]:active {
    transform: scale(0.98);
  }

  /* ── RESULT ── */
  .result {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,212,255,0.15);
    animation: resultIn 0.6s ease both;
  }

  @keyframes resultIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .result-header h2 {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--neon-green);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .result-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,255,136,0.4), transparent);
  }

  .result img {
    width: 100%;
    border-radius: 3px;
    border: 1px solid rgba(0,255,136,0.2);
    box-shadow: 0 0 30px rgba(0,255,136,0.1), 0 10px 40px rgba(0,0,0,0.5);
  }

  /* ── FOOTER ── */
  .footer-text {
    margin-top: 20px;
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-image"></div>
  <div class="scanlines"></div>
  <div class="grid-overlay"></div>

  <!-- HUD dots -->
  <div class="hud-dot"></div>
  <div class="hud-dot"></div>
  <div class="hud-dot"></div>
  <div class="hud-dot"></div>

  <!-- Main card -->
  <div class="card">

    <div class="header">
      <div class="badge">
        <span class="badge-dot"></span>
        System Online
      </div>
      <h1>
        VEHICLE DETECTION
        <span>Powered by Phenominal4</span>
      </h1>
    </div>

    <form method="POST" enctype="multipart/form-data">

      <div class="upload-zone" id="drop-zone">
        <input type="file" name="image" id="file-input" accept="image/*" required
          onchange="document.getElementById('file-name').textContent = this.files[0]?.name || ''">
        <div class="upload-icon">📡</div>
        <div class="upload-label">Upload Vehical Image</div>
        <div class="upload-sub">PNG · JPG · JPEG · WEBP</div>
        <div id="file-name"></div>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-value">Vehical</div>
          <div class="stat-label">Model</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">≥92%</div>
          <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">Real-Time</div>
          <div class="stat-label">Speed</div>
        </div>
      </div>

      <button type="submit">⬡ &nbsp; Initiate Detection</button>

    </form>

    {% if names %}
<div class="result">
  <div class="result-header">
    <h2>Detected Vehicles</h2>
    <div class="result-line"></div>
  </div>

  <ul style="color:#00ff88; font-family:Orbitron; margin-top:10px;">
    {% for name in names %}
      <li>{{ name }}</li>
    {% endfor %}
  </ul>

</div>
{% endif %}
  </div>

  <script>
    // Highlight drop-zone on drag
    const zone = document.getElementById('drop-zone');
    ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => {
      ev.preventDefault();
      zone.style.borderColor = 'var(--neon-green)';
      zone.style.background = 'rgba(0,255,136,0.06)';
    }));
    ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => {
      ev.preventDefault();
      zone.style.borderColor = '';
      zone.style.background = '';
      if (ev.dataTransfer?.files[0]) {
        document.getElementById('file-name').textContent = ev.dataTransfer.files[0].name;
      }
    }));
  </script>

</body>
</html>
